    <style>
        :root {

            --surface2: #f0f2f7;
            --border: #e2e8f0;
            --accent: #0891b2;
            --accent-light: #ecfeff;
            --text: #0f172a;
            --text-mid: #475569;
            --text-dim: #94a3b8;
            --red: #dc2626;
            --red-light: #fef2f2;
            --orange: #ea580c;
            --orange-light: #fff7ed;
            --green: #16a34a;
            --green-light: #f0fdf4;
            --purple: #7c3aed;
            --purple-light: #f5f3ff;
            --topbar-h: 58px;
            --radius: 14px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text); font-size: 17px; line-height: 1.85; }
        
        /* Topbar */
        .topbar {
            position: sticky; top: 0;
            background: linear-gradient(135deg, #0d1b3e 0%, #1a3a6b 55%, #0a2d5c 100%);
            color: white; padding: 0 24px; height: var(--topbar-h);
            display: flex; align-items: center; gap: 14px;
            z-index: 200; box-shadow: 0 4px 20px rgba(0,0,0,0.25);
        }
        .back-btn {
            background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25);
            color: white; padding: 6px 14px; border-radius: 8px; font-size: 15px;
            font-weight: 600; text-decoration: none; cursor: pointer; transition: background 0.15s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.22); }
        .topbar-title { font-size: 17px; font-weight: 700; color: white; flex: 1; }
        
        .container { max-width: 1380px; margin: 0 auto; padding: 28px 32px 110px; }
        
        /* 筛选栏 */
        .filter-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }
        .filter-btn { padding: 8px 16px; border: 2px solid #ddd; background: white; border-radius: 20px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
        .filter-btn:hover { border-color: var(--accent); }
        .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        
        /* 时间轴 */
        .timeline { position: relative; padding-left: 30px; }
        .timeline::before { content: ''; position: absolute; left: 10px; top: 0; bottom: 0; width: 2px; background: linear-gradient(to bottom, var(--accent), var(--purple)); }
        
        .timeline-item { position: relative; margin-bottom: 24px; padding: 20px; background: white; border-radius: var(--radius); box-shadow: 0 2px 8px rgba(0,0,0,0.08); cursor: pointer; transition: all 0.3s; }
        .timeline-item:hover { transform: translateX(4px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
        .timeline-item::before { content: ''; position: absolute; left: -24px; top: 24px; width: 12px; height: 12px; background: var(--accent); border: 3px solid white; border-radius: 50%; box-shadow: 0 0 0 2px var(--accent); }
        
        .item-date { font-size: 12px; color: var(--accent); font-weight: 700; margin-bottom: 6px; }
        .item-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
        .item-issuer { font-size: 13px; color: var(--text-mid); margin-bottom: 10px; }
        .item-badges { display: flex; gap: 6px; flex-wrap: wrap; }
        .badge { padding: 4px 10px; background: var(--accent-light); color: var(--accent); font-size: 12px; border-radius: 4px; }
        .badge.central { background: var(--orange-light); color: var(--orange); }
        .badge.local { background: var(--green-light); color: var(--green); }
        .badge.overseas { background: var(--purple-light); color: var(--purple); }
        
        /* 弹窗 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal-overlay.active { display: block; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 900px; max-height: 90vh; background: white; border-radius: 16px; z-index: 1001; overflow: hidden; }
        .modal.active { display: block; overflow-y: auto; }
        
        .modal-header { background: linear-gradient(135deg, #0d1b3e 0%, #1a3a6b 100%); color: white; padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; }
        .modal-header h2 { font-size: 18px; flex: 1; padding-right: 20px; line-height: 1.4; }
        .modal-close { background: none; border: none; color: white; font-size: 24px; cursor: pointer; padding: 4px 8px; }
        
        .modal-body { padding: 24px; }
        .modal-section { margin-bottom: 24px; }
        .modal-section:last-child { margin-bottom: 0; }
        .modal-section h3 { font-size: 14px; color: var(--accent); margin-bottom: 14px; padding-bottom: 8px; border-bottom: 2px solid var(--accent-light); font-weight: 700; }
        
        /* 基本信息 */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .info-item { background: var(--surface2); padding: 12px 16px; border-radius: 8px; }
        .info-label { font-size: 13px; color: var(--text-dim); margin-bottom: 4px; }
        .info-value { font-size: 14px; color: var(--text); font-weight: 600; }
        
        /* 核心要点 */
        .core-item { margin-bottom: 14px; }
        .core-item:last-child { margin-bottom: 0; }
        .core-phrase { font-size: 15px; font-weight: 700; color: var(--text); padding: 10px 14px; background: var(--surface2); border-radius: 8px; border-left: 4px solid var(--accent); margin-bottom: 6px; display: flex; align-items: flex-start; gap: 8px; }
        .core-phrase::before { content: '▸'; color: var(--accent); font-weight: 700; flex-shrink: 0; }
        .core-explain { font-size: 14px; color: var(--text-mid); line-height: 1.8; padding-left: 22px; }
        
        /* 政策定位 */
        .pos-block { margin-bottom: 12px; }
        .pos-heading { font-size: 13px; font-weight: 700; color: var(--text-mid); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
        .pos-heading::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
        .pos-text { font-size: 14px; color: var(--text-mid); line-height: 1.8; padding: 10px 14px; background: var(--surface2); border-radius: 8px; }
        
        /* 政策影响表格 */
        .impact-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .impact-table th, .impact-table td { padding: 12px; border: 1px solid var(--border); text-align: left; }
        .impact-table th { background: var(--surface2); font-weight: 700; color: var(--accent); }
        .impact-table td { color: var(--text-mid); }
        
        /* 风险控制 */
        .risk-item { padding: 10px 14px; background: var(--red-light); border-left: 4px solid var(--red); border-radius: 0 8px 8px 0; margin-bottom: 10px; }
        .risk-item:last-child { margin-bottom: 0; }
        .risk-name { font-size: 14px; font-weight: 700; color: var(--red); margin-bottom: 4px; }
        .risk-body { font-size: 14px; color: var(--text-mid); line-height: 1.7; }
        
        @media (max-width: 768px) {
            .container { padding: 16px; }
            .info-grid { grid-template-columns: 1fr; }
        }
    </style>

            vertical: '美国清洁能源补贴核心条款',
            horizontal: '全球最具吸引力新能源补贴政策',
            impact: { '上游材料': '倒逼海外产能布局', '中游制造': '北美建厂需求增加', '下游应用': '美国新能源汽车市场扩张', '回收环节': '建立本地回收体系' },
            risk: { policy: '政策不确定性', industry: '地缘政治风险' }
        },
        {
            id: 1,
            title: '新能源汽车废旧动力电池回收和综合利用管理暂行办法',
            date: '2026-01-16',
            issuer: '工业和信息化部、国家发展改革委、生态环境部、交通运输部、商务部、市场监管总局',
            type: 'central',
            bu: ['山东美多', '常州锂源'],
            core: [
                { title: '要求汽车企业落实回收主体责任', content: '汽车生产企业承担废旧动力电池回收的主要责任，需建立回收服务网点' },
                { title: '建立"数字身份证"制度', content: '对动力电池生产、销售、使用、报废全生命周期进行信息追溯' },
                { title: '明确综合利用准入门槛', content: '明确综合利用企业的资质要求和技术规范' }
            ],
            vertical: '落实《新能源汽车产业发展规划》要求，建立回收体系',
            horizontal: '全国首部废旧电池回收专项管理办法',
            impact: { '上游材料': '促进锂、钴、镍资源循环利用', '中游制造': '推动电池制造企业建立回收机制', '下游应用': '提升新能源汽车用户回收意识', '回收环节': '规范回收行业发展' },
            risk: { policy: '地方执行力度不一，监管难度大', industry: '回收成本高，企业积极性不足' }
        }
    ];
    
    // 渲染时间轴
    function renderTimeline(filter = 'all') {
        const timeline = document.getElementById('timeline');
        const filtered = filter === 'all' ? policies : policies.filter(p => p.type === filter);
        
        timeline.innerHTML = filtered.map(p => `
            <div class="timeline-item" onclick="showModal(${p.id})">
                <div class="item-date">${p.date}</div>
                <div class="item-title">${p.title}</div>
                <div class="item-issuer">${p.issuer}</div>
                <div class="item-badges">
                    <span class="badge ${p.type}">${p.type === 'central' ? '中央政策' : p.type === 'local' ? '地方政策' : '海外政策'}</span>
                    ${p.bu.slice(0,3).map(b => `<span class="badge">${b}</span>`).join('')}
                    ${p.bu.length > 3 ? `<span class="badge">+${p.bu.length-3}</span>` : ''}
                </div>
            </div>
        `).join('');
    }
    
    // 显示弹窗
    function showModal(id) {
        const policy = policies.find(p => p.id === id);
        if (!policy) return;
        
        const typeLabel = policy.type === 'central' ? '中央政策' : policy.type === 'local' ? '地方政策' : '海外政策';
        
        const coreHtml = policy.core.map((c, i) => `
            <div class="core-item">
                <div class="core-phrase">核心要点${i+1}：${c.title}</div>
                <div class="core-explain">${c.content}</div>
            </div>
        `).join('');
        
        const impactRows = Object.entries(policy.impact).map(([seg, text]) => 
            `<tr><td>${seg}</td><td>${text}</td></tr>`
        ).join('');
        
        const riskHtml = `
            <div class="risk-item">
                <div class="risk-name">政策推进风险</div>
                <div class="risk-body">${policy.risk.policy}</div>
            </div>
            <div class="risk-item">
                <div class="risk-name">产业链风险</div>
                <div class="risk-body">${policy.risk.industry}</div>
            </div>
        `;
        
        document.getElementById('modal-title').textContent = policy.title;
        document.getElementById('modal-body').innerHTML = `
            <div class="modal-section">
                <h3>基本信息</h3>
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">发布时间</div>
                        <div class="info-value">${policy.date}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">发布主体</div>
                        <div class="info-value">${policy.issuer}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">政策类型</div>
                        <div class="info-value">${typeLabel}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">涉及BU</div>
                        <div class="info-value">${policy.bu.join('、')}</div>
                    </div>
                </div>
            </div>
            <div class="modal-section">
                <h3>核心要点</h3>
                ${coreHtml}
            </div>
            <div class="modal-section">
                <h3>政策定位</h3>
                <div class="pos-block">
                    <div class="pos-heading">纵向（与国家政策关系）</div>
                    <div class="pos-text">${policy.vertical}</div>
                </div>
                <div class="pos-block">
                    <div class="pos-heading">横向（与其他省份对比）</div>
                    <div class="pos-text">${policy.horizontal}</div>
                </div>
            </div>
            <div class="modal-section">
                <h3>政策影响（分环节）</h3>
                <table class="impact-table">
                    <thead><tr><th style="width:120px;">产业环节</th><th>具体影响</th></tr></thead>
                    <tbody>${impactRows}</tbody>
                </table>
            </div>
            <div class="modal-section">
                <h3>风险控制</h3>
                ${riskHtml}
            </div>
        `;
        
        document.getElementById('modal-overlay').classList.add('active');
        document.getElementById('modal').classList.add('active');
    }
    
    // 关闭弹窗
    function closeModal() {
        document.getElementById('modal-overlay').classList.remove('active');
        document.getElementById('modal').classList.remove('active');
    }
    
    // 筛选按钮
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderTimeline(btn.dataset.filter);
        });
    });
    
    // 弹窗关闭
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal-overlay').addEventListener('click', closeModal);
    
    // URL参数解析，自动筛选
    (function() {
        const params = new URLSearchParams(window.location.search);
        const filter = params.get('filter');
        if (filter && ['central', 'local', 'overseas'].includes(filter)) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`[data-filter="${filter}"]`).classList.add('active');
            renderTimeline(filter);
        }
    })();
    </script>
</body>
</html>
