<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据库 - 三元正极及前驱体数据</title>
    <meta name="html-version" content="20260530a">
    <script src="ternary_embedded_data.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #a1a1a1; }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary-dark: #1e3c72;
            --primary-light: #2a5298;
            --bg-gradient-start: #f5f7fa;
            --bg-gradient-end: #c3cfe2;
            --sidebar-width: 280px;
            --sidebar-collapsed: 70px;
            --transition-speed: 0.3s;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            display: flex;
        }

        .sidebar {
            width: var(--sidebar-width); background: #f5f5f5;
            height: 100vh; position: fixed; left: 0; top: 0; z-index: 1000;
            transition: width var(--transition-speed) ease;
            overflow-y: auto; box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }
        .sidebar.collapsed { width: var(--sidebar-collapsed); }

        .sidebar-header {
            padding: 20px 15px; border-bottom: 1px solid rgba(0,0,0,0.1);
            display: flex; align-items: center; justify-content: space-between;
        }
        .sidebar-logo {
            display: flex; align-items: center; gap: 12px;
            color: var(--primary-dark); font-size: 18px; font-weight: bold;
            white-space: nowrap; overflow: hidden;
        }
        .sidebar-logo-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--primary-light), #2a5298);
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            font-size: 18px; flex-shrink: 0;
        }
        .collapse-btn {
            width: 28px; height: 28px; background: rgba(0,0,0,0.08); border: none;
            border-radius: 6px; color: #666; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; flex-shrink: 0;
        }
        .collapse-btn:hover { background: rgba(0,0,0,0.15); color: var(--primary-dark); }
        .sidebar.collapsed .collapse-btn { transform: rotate(180deg); }

        .sidebar-stats { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .sidebar.collapsed .sidebar-stats { display: none; }
        .stat-item { background: rgba(30,60,114,0.08); border-radius: 8px; padding: 10px; text-align: center; }
        .stat-value { color: var(--primary-dark); font-size: 18px; font-weight: bold; }
        .stat-label { color: #888; font-size: 11px; margin-top: 4px; }

        .nav-section { padding: 10px 0; }
        .nav-section-title {
            color: #888; font-size: 13px; font-weight: bold;
            padding: 10px 20px 5px; white-space: nowrap; overflow: hidden;
        }
        .sidebar.collapsed .nav-section-title { opacity: 0; }
        .nav-item {
            display: flex; align-items: center; padding: 12px 15px; color: #333;
            cursor: pointer; transition: all 0.2s;
            position: relative; border-left: 3px solid transparent; gap: 12px;
        }
        .nav-item:hover { background: rgba(0,0,0,0.05); color: var(--primary-dark); }
        .nav-item.active {
            background: linear-gradient(90deg, rgba(30,60,114,0.15) 0%, transparent 100%);
            color: var(--primary-dark); border-left-color: var(--primary-dark);
        }
        .nav-item-icon {
            width: 32px; height: 32px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; flex-shrink: 0;
            background: rgba(30,60,114,0.1); color: var(--primary-dark);
        }
        .nav-item.active .nav-item-icon {
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-light));
            color: white;
        }
        .nav-item-text { font-size: 14px; white-space: nowrap; overflow: hidden; flex: 1; }
        .sidebar.collapsed .nav-item-text { opacity: 0; width: 0; }
        .nav-item-badge {
            background: rgba(30,60,114,0.15); color: var(--primary-dark);
            font-size: 11px; padding: 2px 8px; border-radius: 10px; flex-shrink: 0;
        }
        .sidebar.collapsed .nav-item-badge { position: absolute; top: 5px; right: 5px; padding: 2px 5px; font-size: 10px; }
        .nav-item.active .nav-item-badge { background: var(--primary-dark); color: white; }

        .main-content {
            flex: 1; margin-left: var(--sidebar-width); padding: 20px;
            transition: margin-left var(--transition-speed) ease;
        }
        .sidebar.collapsed ~ .main-content { margin-left: var(--sidebar-collapsed); }

        .toolbar {
            background: white; border-radius: 12px;
            padding: 15px 20px; margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(30,60,114,0.1);
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 15px;
        }
        .toolbar-left { display: flex; align-items: center; gap: 15px; }
        .toolbar-btn {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 18px; border-radius: 8px; border: none;
            cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s;
        }
        .toolbar-btn-secondary { background: #f5f7fa; color: #666; }
        .toolbar-btn-secondary:hover { background: #e9ecef; }
        .toolbar-title { font-size: 20px; font-weight: bold; color: var(--primary-dark); }
        .toolbar-right { display: flex; align-items: center; gap: 15px; }
        .search-box {
            display: flex; align-items: center;
            background: #f5f7fa; border-radius: 8px;
            padding: 8px 15px; gap: 10px;
        }
        .search-box input {
            border: none; background: transparent; outline: none;
            font-size: 14px; width: 200px; color: #333;
        }
        .search-box input::placeholder { color: #999; }
        .update-info { color: #888; font-size: 13px; }
        .update-info span { color: var(--primary-dark); font-weight: 500; }

        .content-section { display: none; animation: fadeIn 0.3s ease; }
        .content-section.active { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px; margin-bottom: 20px;
        }
        .metric-card {
            background: white; border-radius: 12px; padding: 20px;
            box-shadow: 0 4px 15px rgba(30,60,114,0.1);
            position: relative; overflow: hidden; transition: all 0.3s;
        }
        .metric-card::before {
            content: ''; position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: linear-gradient(180deg, var(--primary-light), #2a5298);
        }
        .metric-card:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(30,60,114,0.15); }
        .metric-label { color: #666; font-size: 13px; margin-bottom: 8px; }
        .metric-value { color: var(--primary-dark); font-size: 26px; font-weight: bold; }
        .metric-unit { font-size: 14px; color: #888; font-weight: normal; }

        .data-card {
            background: white; border-radius: 12px; overflow: hidden;
            box-shadow: 0 4px 20px rgba(30,60,114,0.1);
        }
        .data-card-header {
            padding: 15px 20px;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-light));
            color: white; display: flex; justify-content: space-between; align-items: center;
        }
        .data-card-title { font-size: 16px; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        .data-card-actions { display: flex; gap: 10px; }
        .action-btn {
            padding: 6px 12px; background: rgba(255,255,255,0.2);
            border: none; border-radius: 6px; color: white;
            font-size: 12px; cursor: pointer; transition: all 0.2s;
        }
        .action-btn:hover { background: rgba(255,255,255,0.3); }

        .table-container { max-height: 500px; overflow: auto; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .data-table th {
            background: #f8f9fa; color: var(--primary-dark);
            padding: 12px 15px; text-align: left; font-weight: 600;
            position: sticky; top: 0; z-index: 10; border-bottom: 2px solid #e9ecef;
        }
        .data-table td {
            padding: 10px 15px; border-bottom: 1px solid #f0f0f0; transition: background 0.2s;
        }
        .data-table tbody tr:hover { background: #f0fff4; }
        .loading { text-align: center; padding: 40px; color: #888; }
        .rank-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-light));
            color: white; padding: 4px 10px; border-radius: 12px;
            font-size: 12px; font-weight: bold;
        }
        .rank-badge.top3 { background: linear-gradient(135deg, #ffd700, #f39c12); color: #333; }

        .wide-table { min-width: 900px; }

        @media (max-width: 768px) {
            .sidebar { width: var(--sidebar-collapsed); }
            .sidebar.collapsed { width: 0; }
            .main-content { margin-left: var(--sidebar-collapsed); }
        }
    </style>
</head>
<body>
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <div class="sidebar-logo-icon">🔋</div>
                <span class="logo-text">三元材料数据库</span>
            </div>
            <button class="collapse-btn" onclick="toggleSidebar()">◀</button>
        </div>
        <div class="sidebar-stats">
            <div class="stat-item">
                <div class="stat-value" id="totalTables">19</div>
                <div class="stat-label">数据表</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="totalRecords">-</div>
                <div class="stat-label">数据条数</div>
            </div>
        </div>
        <div id="sidebarNav"></div>
    </nav>

    <main class="main-content">
        <div class="toolbar">
            <div class="toolbar-left">
                <button class="toolbar-btn toolbar-btn-secondary" onclick="window.location.href='index_v3.html'">← 返回首页</button>
                <button class="toolbar-btn toolbar-btn-secondary" onclick="window.location.href='database_hub.html'">← 返回数据库</button>
                <button class="toolbar-btn toolbar-btn-secondary" onclick="window.location.href='ternary_charts.html'">📈 可视化看板</button>
                <div class="toolbar-title">🔋 三元正极及前驱体数据库</div>
            </div>
            <div class="toolbar-right">
                <div class="search-box">
                    🔍 <input type="text" placeholder="搜索数据..." id="searchInput" oninput="filterTable()">
                </div>
                <div class="update-info">
                    更新于 <span id="updateTime">加载中...</span>
                </div>
            </div>
        </div>
        <div id="contentArea"></div>
    </main>

<script>
// === TAB CONFIGURATION ===
// type: 'industry'=指标卡+竖表 | 'model-output'=型号产量横表 | 'company'=企业排名表
//       'trade-total'=贸易总量表 | 'trade-partner'=贸易伙伴表 | 'spot-price'=现货价格表

const TAB_CONFIG = [
    // === 三元正极 (NCM Cathode) ===
    { id:'ncm-industry', group:'三元正极', table:'三元正极-行业产量规模',
      icon:'📊', title:'行业整体产量', type:'industry' },
    { id:'ncm-model', group:'三元正极', table:'三元正极-型号产量',
      icon:'📊', title:'分型号产量', type:'model-output' },
    { id:'ncm-company', group:'三元正极', table:'三元正极-分企业产量',
      icon:'🏭', title:'分企业产量', type:'company' },
    { id:'ncm-export', group:'三元正极', table:'三元正极-出口总额',
      icon:'🚢', title:'出口总量', type:'trade-total' },
    { id:'ncm-export-partner', group:'三元正极', table:'三元正极-出口目的地',
      icon:'🌏', title:'出口目的地', type:'trade-partner' },
    { id:'ncm-import', group:'三元正极', table:'三元正极-进口总额',
      icon:'🛥️', title:'进口总量', type:'trade-total' },
    { id:'ncm-import-partner', group:'三元正极', table:'三元正极-进口目的地',
      icon:'🌏', title:'进口目的地', type:'trade-partner' },
    { id:'ncm-price', group:'三元正极', table:'三元正极-现货市场价',
      icon:'💰', title:'现货市场价', type:'spot-price' },

    // === 三元前驱体 (NCM Precursor) ===
    { id:'pre-industry', group:'三元前驱体', table:'三元前驱体-行业产量规模',
      icon:'📊', title:'行业整体产量', type:'industry' },
    { id:'pre-model', group:'三元前驱体', table:'三元前驱体-型号产量',
      icon:'📊', title:'分型号产量', type:'model-output' },
    { id:'pre-company', group:'三元前驱体', table:'三元前驱体-分企业产量',
      icon:'🏭', title:'分企业产量', type:'company' },
    { id:'pre-export', group:'三元前驱体', table:'三元前驱体-出口总额',
      icon:'🚢', title:'出口总量', type:'trade-total' },
    { id:'pre-export-partner', group:'三元前驱体', table:'三元前驱体-出口目的地',
      icon:'🌏', title:'出口目的地', type:'trade-partner' },
    { id:'pre-import', group:'三元前驱体', table:'三元前驱体-进口总额',
      icon:'🛥️', title:'进口总量', type:'trade-total' },
    { id:'pre-import-partner', group:'三元前驱体', table:'三元前驱体-进口目的地',
      icon:'🌏', title:'进口目的地', type:'trade-partner' },
    { id:'pre-price', group:'三元前驱体', table:'三元前驱体-现货市场价',
      icon:'💰', title:'现货市场价', type:'spot-price' },

    // === 关键原料 (Key Raw Materials) ===
    { id:'raw-price', group:'关键原料', table:'关键原料-现货市场价',
      icon:'💰', title:'关键原料现货价', type:'spot-price' },
    { id:'cobalt-industry', group:'关键原料', table:'硫酸钴镍-行业产量规模',
      icon:'📊', title:'硫酸钴镍产量规模', type:'industry' },
    { id:'cobalt-price', group:'关键原料', table:'硫酸钴镍-现货市场价',
      icon:'💰', title:'硫酸钴镍现货价', type:'spot-price' }
];

const GROUP_ICONS = { '三元正极':'🔋', '三元前驱体':'⚗️', '关键原料':'🧪' };

// === UTILITY FUNCTIONS ===
function num(v) { const n = parseFloat(v); return isNaN(n) ? 0 : n; }
function pct(v) { return v == null || v === '' ? '-' : String(v); }
function fmtNum(v) { const n = num(v); return n ? n.toLocaleString() : '-'; }
function fmtDate(v) { return v ? String(v).split(' ')[0] : '-'; }

let allData = {};
let activeTabId = null;

// === BUILD UI ===
function buildSidebar() {
    let html = '';
    const groups = [...new Set(TAB_CONFIG.map(t => t.group))];
    groups.forEach(group => {
        html += `<div class="nav-section"><div class="nav-section-title">${GROUP_ICONS[group]||''} ${group}</div>`;
        TAB_CONFIG.filter(t => t.group === group).forEach((t, i) => {
            html += `<div class="nav-item${i===0 && group===groups[0]?' active':''}"
                         onclick="showTab('${t.id}', this)" data-tab="${t.id}">
                <div class="nav-item-icon">${t.icon}</div>
                <span class="nav-item-text">${t.title}</span>
                <span class="nav-item-badge" id="badge-${t.id}">—</span></div>`;
        });
        html += '</div>';
    });
    document.getElementById('sidebarNav').innerHTML = html;
}

function buildContentAreas() {
    let html = '';
    TAB_CONFIG.forEach((t, i) => {
        html += `<div id="${t.id}" class="content-section${i===0?' active':''}">
            <div class="metrics-grid" id="${t.id}-metrics" style="display:none"></div>
            <div class="data-card">
                <div class="data-card-header">
                    <div class="data-card-title">${t.icon} ${t.title}</div>
                    <div class="data-card-actions">
                        <button class="action-btn" onclick="exportTable('${t.id}-table')">📥 导出CSV</button>
                    </div>
                </div>
                <div class="table-container">
                    <table class="data-table" id="${t.id}-table">
                        <thead><tr id="${t.id}-head"></tr></thead>
                        <tbody id="${t.id}-body"><tr><td class="loading">数据加载中</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>`;
    });
    document.getElementById('contentArea').innerHTML = html;
}

// === SIDEBAR TOGGLE & TAB SWITCHING ===
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('collapsed');
}

function showTab(tabId, element) {
    document.querySelectorAll('.content-section').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    const section = document.getElementById(tabId);
    if (section) section.classList.add('active');
    if (element) element.classList.add('active');
    activeTabId = tabId;
    const cfg = TAB_CONFIG.find(t => t.id === tabId);
    if (cfg) {
        renderConfigTable(cfg);
        window.location.hash = tabId;
    }
}

function restoreTabFromHash() {
    const hash = window.location.hash.slice(1);
    if (hash) {
        const navItem = document.querySelector(`[data-tab="${hash}"]`);
        if (navItem) showTab(hash, navItem);
        else {
            // First tab by default
            const first = TAB_CONFIG[0];
            const firstNav = document.querySelector(`[data-tab="${first.id}"]`);
            if (firstNav) showTab(first.id, firstNav);
        }
    }
}

// === RENDER ENGINES ===

function getHeaders(data) {
    if (!data || !data.length) return [];
    return Object.keys(data[0]);
}

function renderTableHeader(tableId, headers) {
    document.getElementById(tableId + '-head').innerHTML =
        headers.map(h => `<th>${h}</th>`).join('');
}

function renderIndustryTable(cfg, data) {
    // Metrics cards
    const sorted = [...data].sort((a,b) => String(b['月份']||'').localeCompare(a['月份']||''));
    const latest = sorted[0] || {};
    const metricsEl = document.getElementById(cfg.id + '-metrics');
    metricsEl.style.display = 'grid';
    metricsEl.innerHTML = `
        <div class="metric-card"><div class="metric-label">月度产量（${pct(latest['月份'])}）</div>
            <div class="metric-value">${fmtNum(latest['月度产量'])}<span class="metric-unit">吨</span></div></div>
        <div class="metric-card"><div class="metric-label">产能利用率（${pct(latest['月份'])}）</div>
            <div class="metric-value">${pct(latest['产能利用率'])}</div></div>
        <div class="metric-card"><div class="metric-label">月度产能（${pct(latest['月份'])}）</div>
            <div class="metric-value">${fmtNum(latest['月度产能'])}<span class="metric-unit">吨</span></div></div>
    `;
    // Table
    const headers = getHeaders(data);
    renderTableHeader(cfg.id, headers);
    let html = sorted.slice(0, 24).map(d =>
        `<tr>${headers.map(h => `<td>${pct(d[h])}</td>`).join('')}</tr>`
    ).join('');
    document.getElementById(cfg.id + '-body').innerHTML = html || '<tr><td class="loading">暂无数据</td></tr>';
}

function renderModelOutputTable(cfg, data) {
    document.getElementById(cfg.id + '-metrics').style.display = 'none';
    if (!data.length) {
        document.getElementById(cfg.id + '-body').innerHTML = '<tr><td class="loading">暂无数据</td></tr>';
        return;
    }
    const headers = getHeaders(data);
    // Identify fixed columns (non-numeric/date columns) vs model columns
    const fixedCols = [];
    const modelCols = [];
    headers.forEach(h => {
        const vals = data.slice(0, 5).map(d => d[h]);
        const allNumeric = vals.every(v => v !== null && v !== '' && !isNaN(parseFloat(v)));
        if (allNumeric && !/日期|月份|年|月/.test(h)) {
            modelCols.push(h);
        } else {
            fixedCols.push(h);
        }
    });
    // Build melted table: each row = (fixed columns + 型号 + 产量)
    const meltedHeaders = [...fixedCols, '型号', '产量（吨）'];
    renderTableHeader(cfg.id, meltedHeaders);
    const sorted = [...data].sort((a,b) => String(b['月份']||b['日期']||'').localeCompare(a['月份']||a['日期']||''));
    let html = '';
    sorted.forEach(d => {
        modelCols.forEach((mc, mi) => {
            const val = d[mc];
            if (val == null || val === '') return;
            html += '<tr>';
            fixedCols.forEach(fc => { html += `<td>${pct(d[fc])}</td>`; });
            html += `<td>${mc}</td><td>${fmtNum(val)}</td></tr>`;
        });
    });
    document.getElementById(cfg.id + '-body').innerHTML = html || '<tr><td class="loading">暂无数据</td></tr>';
}

function renderCompanyTable(cfg, data) {
    document.getElementById(cfg.id + '-metrics').style.display = 'none';
    if (!data.length) {
        document.getElementById(cfg.id + '-body').innerHTML = '<tr><td class="loading">暂无数据</td></tr>';
        return;
    }
    const headers = getHeaders(data);
    renderTableHeader(cfg.id, ['排名', ...headers]);
    const sorted = [...data].sort((a,b) => String(b['月份']||'').localeCompare(a['月份']||''));
    const latestMonth = sorted[0] ? sorted[0]['月份'] : '';
    const latest = sorted.filter(d => d['月份'] === latestMonth);
    latest.sort((a,b) => num(b['产量']) - num(a['产量']));
    let html = latest.slice(0, 50).map((d, i) =>
        `<tr><td><span class="rank-badge ${i<3?'top3':''}">${i+1}</span></td>
            ${headers.map(h => `<td>${pct(d[h])}</td>`).join('')}</tr>`
    ).join('');
    document.getElementById(cfg.id + '-body').innerHTML = html || '<tr><td class="loading">暂无数据</td></tr>';
}

function renderTradeTotalTable(cfg, data) {
    document.getElementById(cfg.id + '-metrics').style.display = 'none';
    if (!data.length) {
        document.getElementById(cfg.id + '-body').innerHTML = '<tr><td class="loading">暂无数据</td></tr>';
        return;
    }
    const headers = getHeaders(data);
    renderTableHeader(cfg.id, headers);
    const sorted = [...data].sort((a,b) => {
        const ma = a['月份'] || '', mb = b['月份'] || '';
        return String(mb).localeCompare(String(ma));
    });
    let html = sorted.map(d =>
        `<tr>${headers.map(h => `<td>${pct(d[h])}</td>`).join('')}</tr>`
    ).join('');
    document.getElementById(cfg.id + '-body').innerHTML = html || '<tr><td class="loading">暂无数据</td></tr>';
}

function renderTradePartnerTable(cfg, data) {
    // Same as trade-total but typically has 目的地/贸易伙伴 instead of 月份
    document.getElementById(cfg.id + '-metrics').style.display = 'none';
    if (!data.length) {
        document.getElementById(cfg.id + '-body').innerHTML = '<tr><td class="loading">暂无数据</td></tr>';
        return;
    }
    const headers = getHeaders(data);
    renderTableHeader(cfg.id, headers);
    let html = data.slice(0, 200).map(d =>
        `<tr>${headers.map(h => `<td>${pct(d[h])}</td>`).join('')}</tr>`
    ).join('');
    document.getElementById(cfg.id + '-body').innerHTML = html || '<tr><td class="loading">暂无数据</td></tr>';
}

function renderSpotPriceTable(cfg, data) {
    document.getElementById(cfg.id + '-metrics').style.display = 'none';
    if (!data.length) {
        document.getElementById(cfg.id + '-body').innerHTML = '<tr><td class="loading">暂无数据</td></tr>';
        return;
    }
    const headers = getHeaders(data);
    const dateCol = headers[0]; // '当前日期' or similar

    // Group columns into (model, [low, high, avg]) triplets
    const priceTypes = ['最低价格', '最高价格', '均价'];
    const modelMap = {}; // modelName -> { 最低价格: colName, 最高价格: colName, 均价: colName }
    headers.slice(1).forEach(h => {
        for (const pt of priceTypes) {
            if (h.endsWith(pt)) {
                const model = h.slice(0, -pt.length);
                if (!modelMap[model]) modelMap[model] = {};
                modelMap[model][pt] = h;
                break;
            }
        }
    });

    const models = Object.keys(modelMap);
    if (models.length === 0) {
        // Fallback: render all columns as-is with horizontal scroll
        renderTableHeader(cfg.id, headers);
        const sorted = [...data].sort((a,b) => String(b[dateCol]||'').localeCompare(a[dateCol]||''));
        let html = sorted.slice(0, 30).map(d =>
            `<tr>${headers.map(h => `<td>${pct(d[h])}</td>`).join('')}</tr>`
        ).join('');
        document.getElementById(cfg.id + '-body').innerHTML = html;
        return;
    }

    // Melted headers: 日期 + 型号 + 最低价 + 最高价 + 均价
    const meltedHeaders = [dateCol, '型号', '最低价', '最高价', '均价'];
    renderTableHeader(cfg.id, meltedHeaders);

    const sorted = [...data].sort((a,b) => String(b[dateCol]||'').localeCompare(a[dateCol]||''));
    let html = '';
    sorted.slice(0, 100).forEach(d => {
        models.forEach(model => {
            const cols = modelMap[model];
            const low = cols['最低价格'] ? d[cols['最低价格']] : null;
            const high = cols['最高价格'] ? d[cols['最高价格']] : null;
            const avg = cols['均价'] ? d[cols['均价']] : null;
            if (low == null && high == null && avg == null) return;
            html += `<tr><td>${fmtDate(d[dateCol])}</td><td>${model}</td>
                <td>${low != null ? num(low).toFixed(2) : '-'}</td>
                <td>${high != null ? num(high).toFixed(2) : '-'}</td>
                <td>${avg != null ? num(avg).toFixed(2) : '-'}</td></tr>`;
        });
    });
    document.getElementById(cfg.id + '-body').innerHTML = html || '<tr><td class="loading">暂无数据</td></tr>';
}

function renderConfigTable(cfg) {
    const data = allData[cfg.table] || [];
    switch (cfg.type) {
        case 'industry':       renderIndustryTable(cfg, data); break;
        case 'model-output':   renderModelOutputTable(cfg, data); break;
        case 'company':        renderCompanyTable(cfg, data); break;
        case 'trade-total':    renderTradeTotalTable(cfg, data); break;
        case 'trade-partner':  renderTradePartnerTable(cfg, data); break;
        case 'spot-price':     renderSpotPriceTable(cfg, data); break;
        default:
            document.getElementById(cfg.id + '-metrics').style.display = 'none';
            renderTableHeader(cfg.id, getHeaders(data));
            document.getElementById(cfg.id + '-body').innerHTML =
                data.map(d => `<tr>${getHeaders(data).map(h => `<td>${pct(d[h])}</td>`).join('')}</tr>`).join('');
    }
}

// === SEARCH & EXPORT ===
function filterTable() {
    const text = document.getElementById('searchInput').value.toLowerCase();
    const active = document.querySelector('.content-section.active');
    if (!active) return;
    active.querySelectorAll('tbody tr').forEach(row => {
        row.style.display = row.textContent.toLowerCase().includes(text) ? '' : 'none';
    });
}

function exportTable(tableId) {
    const table = document.getElementById(tableId);
    if (!table) return;
    let csv = '';
    table.querySelectorAll('tr').forEach(row => {
        const cells = Array.from(row.querySelectorAll('th,td'));
        csv += cells.map(c => '"' + c.textContent.replace(/"/g,'""') + '"').join(',') + '\n';
    });
    const blob = new Blob(['\uFEFF' + csv], { type:'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = tableId + '_' + new Date().toISOString().slice(0,10) + '.csv';
    a.click();
}

// === DATA LOADING ===
async function loadAllData() {
    if (typeof TERNARY_DATA !== 'undefined' && TERNARY_DATA.tables) {
        TERNARY_DATA.tables.forEach(t => {
            allData[t.table_name] = t.data;
            const cfg = TAB_CONFIG.find(c => c.table === t.table_name);
            if (cfg) {
                const badge = document.getElementById('badge-' + cfg.id);
                if (badge) badge.textContent = t.data.length > 999 ? Math.floor(t.data.length/100)*10 + '+' : t.data.length;
            }
        });
        document.getElementById('updateTime').textContent = TERNARY_DATA.update_time || '-';
        const total = TERNARY_DATA.tables.reduce((s,t) => s + (t.row_count || t.data.length), 0);
        document.getElementById('totalRecords').textContent = (total/10000).toFixed(1) + '万';
        // Render first tab
        const first = TAB_CONFIG[0];
        renderConfigTable(first);
        activeTabId = first.id;
        restoreTabFromHash();
        return;
    }
    // Fallback: try fetch JSON
    try {
        const res = await fetch('ternary_all_data.json?_t=' + Date.now());
        if (!res.ok) throw new Error(res.status);
        const d = await res.json();
        document.getElementById('updateTime').textContent = d.update_time || '-';
        d.tables.forEach(t => {
            allData[t.table_name] = t.data;
            const cfg = TAB_CONFIG.find(c => c.table === t.table_name);
            if (cfg) {
                const badge = document.getElementById('badge-' + cfg.id);
                if (badge) badge.textContent = t.data.length;
            }
        });
        const total = d.tables.reduce((s,t) => s + (t.row_count || t.data.length), 0);
        document.getElementById('totalRecords').textContent = (total/10000).toFixed(1) + '万';
        const first = TAB_CONFIG[0];
        renderConfigTable(first);
        activeTabId = first.id;
        restoreTabFromHash();
    } catch(e) {
        console.error(e);
        document.querySelectorAll('[id$="-body"]').forEach(el => {
            el.innerHTML = '<tr><td class="loading">数据加载失败，请确保使用本地服务器访问</td></tr>';
        });
    }
}

// === KEYBOARD SHORTCUTS ===
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') toggleSidebar();
    if (e.ctrlKey && e.key === 'f') { e.preventDefault(); document.getElementById('searchInput').focus(); }
});

// === INIT ===
buildSidebar();
buildContentAreas();
loadAllData();
</script>
