<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>事业部矩阵 - 简化版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif;
            background: linear-gradient(135deg, #e8edf5 0%, #d5dde8 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .page-content {
            max-width: 1300px;
            margin: 0 auto;
        }
        .section-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1e3c72;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(30,60,114,0.1);
        }
        .matrix-grid {
            display: grid;
            grid-template-columns: 1fr 1.3fr 1fr;
            gap: 24px;
            align-items: stretch;
        }
        .matrix-panel {
            background: #ffffff;
            border-radius: 20px;
            padding: 28px 24px;
            box-shadow: 0 4px 20px rgba(30,60,114,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .matrix-panel:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(30,60,114,0.15);
        }
        .panel-section-title {
            font-size: 1rem;
            font-weight: 700;
            color: #1e3c72;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(30,60,114,0.08);
        }
        .bu-card {
            background: linear-gradient(135deg, #ffffff, #fafcff);
            border: 1px solid rgba(0,212,255,0.15);
            border-radius: 14px;
            padding: 16px 14px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.35s;
        }
        .bu-card:hover {
            transform: translateY(-3px);
            border-color: rgba(0,212,255,0.35);
            box-shadow: 0 8px 28px rgba(0,212,255,0.15);
        }
        .card-logo-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .card-logo-img {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            object-fit: contain;
        }
        .card-name {
            font-size: 0.95rem;
            font-weight: 700;
            color: #1e3c72;
        }
        .card-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 600;
            background: rgba(30,60,114,0.05);
            border: 1px solid rgba(30,60,114,0.1);
            color: #1e3c72;
            margin-top: 4px;
        }
        .card-meta {
            font-size: 0.7rem;
            color: rgba(30,60,114,0.5);
            line-height: 1.5;
        }
        .pentagon-wrap {
            position: relative;
            height: 360px;
        }
        .pos-center {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%,-50%);
            z-index: 5;
        }
        .pos-top-left {
            position: absolute;
            left: 0;
            top: 0;
            z-index: 3;
        }
        .pos-top-right {
            position: absolute;
            right: 0;
            top: 0;
            z-index: 3;
        }
        .pos-bottom-left {
            position: absolute;
            left: 0;
            bottom: 0;
            z-index: 3;
        }
        .pos-bottom-right {
            position: absolute;
            right: 0;
            bottom: 0;
            z-index: 3;
        }
    </style>
</head>
<body>
    <div class="page-content">
        <div class="section-title">📋 事业部矩阵</div>
        <div class="matrix-grid" id="matrix-grid">
            <!-- 左面板：新能源矩阵 -->
            <div class="matrix-panel">
                <div class="panel-section-title">⚡ 新能源矩阵</div>
                <div class="bu-card" onclick="alert('常州锂源 - 磷酸铁锂正极材料')">
                    <div class="card-logo-wrap">
                        <img class="card-logo-img" src="https://via.placeholder.com/48x48/1e3c72/ffffff?text=锂源" alt="常州锂源">
                        <div>
                            <div class="card-name">常州锂源</div>
                            <span class="card-tag">新能源材料</span>
                        </div>
                    </div>
                    <div class="card-meta">磷酸铁锂正极材料领先企业</div>
                </div>
                <div class="bu-card" onclick="alert('龙蟠时代 - 电芯智造')">
                    <div class="card-logo-wrap">
                        <img class="card-logo-img" src="https://via.placeholder.com/48x48/4caf50/ffffff?text=时代" alt="龙蟠时代">
                        <div>
                            <div class="card-name">龙蟠时代</div>
                            <span class="card-tag">电芯智造</span>
                        </div>
                    </div>
                    <div class="card-meta">动力电池研发与制造</div>
                </div>
                <div class="bu-card" onclick="alert('三金锂电 - 三元前驱体')">
                    <div class="card-logo-wrap">
                        <img class="card-logo-img" src="https://via.placeholder.com/48x48/ff9800/ffffff?text=三金" alt="三金锂电">
                        <div>
                            <div class="card-name">三金锂电</div>
                            <span class="card-tag">三元前驱体</span>
                        </div>
                    </div>
                    <div class="card-meta">三元材料前驱体研发生产</div>
                </div>
            </div>

            <!-- 中面板：化学品矩阵（五边形布局） -->
            <div class="matrix-panel">
                <div class="panel-section-title">🧪 化学品矩阵</div>
                <div class="pentagon-wrap">
                    <div class="pos-center">
                        <div class="bu-card" style="min-width:130px;">
                            <div class="card-logo-wrap">
                                <img class="card-logo-img" src="https://via.placeholder.com/48x48/9c27b0/ffffff?text=法恩" alt="法恩莱特">
                                <div>
                                    <div class="card-name">法恩莱特</div>
                                    <span class="card-tag">电解液</span>
                                </div>
                            </div>
                            <div class="card-meta">电解液研发与生产</div>
                        </div>
                    </div>
                    <div class="pos-top-left">
                        <div class="bu-card">
                            <div class="card-logo-wrap">
                                <img class="card-logo-img" src="https://via.placeholder.com/48x48/e91e63/ffffff?text=美多" alt="山东美多">
                                <div>
                                    <div class="card-name">山东美多</div>
                                    <span class="card-tag">回收再利用</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="pos-top-right">
                        <div class="bu-card">
                            <div class="card-logo-wrap">
                                <img class="card-logo-img" src="https://via.placeholder.com/48x48/78909c/ffffff?text=润滑" alt="润滑油">
                                <div>
                                    <div class="card-name">润滑油</div>
                                    <span class="card-tag">润滑防护</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="pos-bottom-left">
                        <div class="bu-card">
                            <div class="card-logo-wrap">
                                <img class="card-logo-img" src="https://via.placeholder.com/48x48/34495e/ffffff?text=迪克" alt="迪克化学">
                                <div>
                                    <div class="card-name">迪克化学</div>
                                    <span class="card-tag">精细化工</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="pos-bottom-right">
                        <div class="bu-card">
                            <div class="card-logo-wrap">
                                <img class="card-logo-img" src="https://via.placeholder.com/48x48/27ae60/ffffff?text=铂源" alt="铂源催化">
                                <div>
                                    <div class="card-name">铂源催化</div>
                                    <span class="card-tag">催化技术</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右面板：综合评价 -->
            <div class="matrix-panel">
                <div class="panel-section-title">📊 综合评价</div>
                <div class="bu-card">
                    <div class="card-logo-wrap">
                        <div>
                            <div class="card-name">集团汇总</div>
                            <span class="card-tag">全员晨会</span>
                        </div>
                    </div>
                    <div class="card-meta">点击查看集团整体运营数据</div>
                </div>
                <div style="margin-top: 20px; padding: 16px; background: rgba(30,60,114,0.03); border-radius: 12px;">
                    <div style="font-size: 0.85rem; font-weight: 600; color: #1e3c72; margin-bottom: 12px;">⚡ 核心指标</div>
                    <div style="display: flex; flex-direction: column; gap: 8px;">
                        <div style="display: flex; justify-content: space-between; font-size: 0.75rem;">
                            <span style="color: rgba(30,60,114,0.6);">营收完成率</span>
                            <span style="font-weight: 700; color: #1e3c72;">87%</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; font-size: 0.75rem;">
                            <span style="color: rgba(30,60,114,0.6);">毛利率</span>
                            <span style="font-weight: 700; color: #1e3c72;">22.4%</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; font-size: 0.75rem;">
                            <span style="color: rgba(30,60,114,0.6);">产能利用率</span>
                            <span style="font-weight: 700; color: #1e3c72;">78%</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
