<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电解液数据库 - 市场行情看板</title>
    <meta name="html-version" content="20260518">
    <script src="reports/market_electrolyte.json"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 16px;
            padding: 20px 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            color: #1e3c72;
            font-size: 28px;
        }
        
        .back-btn {
            padding: 10px 20px;
            background: #1e3c72;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .back-btn:hover {
            background: #2a5298;
        }
        
        .update-time {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        
        /* 市场行情卡片 */
        .market-section {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .section-title {
            font-size: 20px;
            font-weight: bold;
            color: #1e3c72;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }
        
        .price-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #e8f0ff 100%);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
            border: 1px solid rgba(30,60,114,0.1);
        }
        
        .price-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(30,60,114,0.15);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .card-title {
            font-size: 16px;
            font-weight: bold;
            color: #1e3c72;
        }
        
        .card-trend {
            font-size: 14px;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: bold;
        }
        
        .trend-up { background: #f00; color: white; }
        .trend-down { background: #0a0; color: white; }
        
        .price-value {
            font-size: 32px;
            font-weight: bold;
            color: #1e3c72;
            margin: 10px 0;
        }
        
        .price-unit {
            font-size: 14px;
            color: #666;
        }
        
        .price-range {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(0,0,0,0.1);
        }
        
        .range-item {
            text-align: center;
        }
        
        .range-label {
            font-size: 12px;
            color: #999;
        }
        
        .range-value {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-top: 5px;
        }
        
        .change-pct {
            font-size: 18px;
            font-weight: bold;
            margin-top: 10px;
        }
        
        .change-up { color: #f00; }
        .change-down { color: #0a0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>📊 电解液市场行情看板</h1>
                <div class="update-time" id="updateTime">更新时间：加载中...</div>
            </div>
            <button class="back-btn" onclick="window.location.href='electrolyte_data_v2.html'">← 返回数据库</button>
        </div>
        
        <div id="dashboardContent">
            <!-- 动态生成看板内容 -->
        </div>
    </div>
    
    <script>
        // 加载市场数据
        function loadMarketData() {
            // 这里应该加载 market_electrolyte.json
            // 由于没有真正的API，我们使用内嵌数据
            const data = {
                "update_time": "2026-05-18 08:30:00",
                "source": "电解液行业数据库",
                "categories": [
                    {
                        "category": "电解液价格",
                        "items": [
                            { "name": "磷酸铁锂动力型", "price": 2.85, "unit": "万元/吨", "change_pct": -1.5, "trend": "down", "high": 3.1, "low": 2.6, "avg": 2.85 },
                            { "name": "磷酸铁锂储能型", "price": 2.65, "unit": "万元/吨", "change_pct": -1.2, "trend": "down", "high": 2.9, "low": 2.4, "avg": 2.65 },
                            { "name": "三元动力型", "price": 3.8, "unit": "万元/吨", "change_pct": -0.8, "trend": "down", "high": 4.2, "low": 3.5, "avg": 3.8 },
                            { "name": "圆柱2600mAh", "price": 2.95, "unit": "万元/吨", "change_pct": -1.0, "trend": "down", "high": 3.2, "low": 2.7, "avg": 2.95 },
                            { "name": "圆柱2200mAh", "price": 2.75, "unit": "万元/吨", "change_pct": -1.3, "trend": "down", "high": 3.0, "low": 2.5, "avg": 2.75 }
                        ]
                    },
                    {
                        "category": "高压电解液价格",
                        "items": [
                            { "name": "4.4V以上", "price": 5.2, "unit": "万元/吨", "change_pct": -0.5, "trend": "down", "high": 5.8, "low": 4.8, "avg": 5.2 },
                            { "name": "4.4V", "price": 4.8, "unit": "万元/吨", "change_pct": -0.6, "trend": "down", "high": 5.3, "low": 4.5, "avg": 4.8 },
                            { "name": "4.35V", "price": 4.5, "unit": "万元/吨", "change_pct": -0.7, "trend": "down", "high": 4.9, "low": 4.2, "avg": 4.5 }
                        ]
                    },
                    {
                        "category": "六氟磷酸锂价格",
                        "items": [
                            { "name": "主流市场", "price": 9.75, "unit": "万元/吨", "change_pct": -2.1, "trend": "down", "high": 10.0, "low": 9.5, "avg": 9.75 },
                            { "name": "出口", "price": 10.2, "unit": "万元/吨", "change_pct": -1.8, "trend": "down", "high": 10.5, "low": 9.8, "avg": 10.2 }
                        ]
                    },
                    {
                        "category": "LiFSI价格",
                        "items": [
                            { "name": "固态", "price": 28.5, "unit": "万元/吨", "change_pct": -1.0, "trend": "down", "high": 30.0, "low": 27.0, "avg": 28.5 },
                            { "name": "液态", "price": 22.0, "unit": "万元/吨", "change_pct": -1.2, "trend": "down", "high": 23.5, "low": 20.5, "avg": 22.0 }
                        ]
                    },
                    {
                        "category": "添加剂价格",
                        "items": [
                            { "name": "VC", "price": 13.5, "unit": "万元/吨", "change_pct": -0.5, "trend": "down", "high": 14.0, "low": 13.0, "avg": 13.5 },
                            { "name": "PS", "price": 13.75, "unit": "万元/吨", "change_pct": -0.4, "trend": "down", "high": 14.5, "low": 13.0, "avg": 13.75 },
                            { "name": "FEC", "price": 5.4, "unit": "万元/吨", "change_pct": -0.3, "trend": "down", "high": 5.8, "low": 5.0, "avg": 5.4 }
                        ]
                    }
                ]
            };
            
            renderDashboard(data);
        }
        
        // 渲染看板
        function renderDashboard(data) {
            document.getElementById('updateTime').textContent = '更新时间：' + data.update_time;
            
            let html = '';
            
            data.categories.forEach(cat => {
                html += '<div class="market-section">';
                html += '<div class="section-title">📊 ' + cat.category + '</div>';
                html += '<div class="cards-grid">';
                
                cat.items.forEach(item => {
                    const trendClass = item.trend === 'up' ? 'trend-up' : 'trend-down';
                    const changeClass = item.change_pct > 0 ? 'change-up' : 'change-down';
                    const changeSign = item.change_pct > 0 ? '+' : '';
                    
                    html += '<div class="price-card">';
                    html += '  <div class="card-header">';
                    html += '    <div class="card-title">' + item.name + '</div>';
                    html += '    <div class="card-trend ' + trendClass + '">' + (item.trend === 'up' ? '↑' : '↓') + '</div>';
                    html += '  </div>';
                    html += '  <div class="price-value">' + item.price.toFixed(2) + '</div>';
                    html += '  <div class="price-unit">' + item.unit + '</div>';
                    html += '  <div class="change-pct ' + changeClass + '">' + changeSign + item.change_pct.toFixed(2) + '%</div>';
                    html += '  <div class="price-range">';
                    html += '    <div class="range-item">';
                    html += '      <div class="range-label">最高价</div>';
                    html += '      <div class="range-value">' + item.high.toFixed(2) + '</div>';
                    html += '    </div>';
                    html += '    <div class="range-item">';
                    html += '      <div class="range-label">最低价</div>';
                    html += '      <div class="range-value">' + item.low.toFixed(2) + '</div>';
                    html += '    </div>';
                    html += '    <div class="range-item">';
                    html += '      <div class="range-label">均价</div>';
                    html += '      <div class="range-value">' + item.avg.toFixed(2) + '</div>';
                    html += '    </div>';
                    html += '  </div>';
                    html += '</div>';
                });
                
                html += '</div>';
                html += '</div>';
            });
            
            document.getElementById('dashboardContent').innerHTML = html;
        }
        
        // 页面加载时执行
        window.onload = loadMarketData;
    </script>
</body>
</html>
