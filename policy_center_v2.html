                <div class="item-badges">
                    <span class="badge">${p.type === 'central' ? '中央政策' : p.type === 'local' ? '地方政策' : '海外政策'}</span>
                    ${p.bu.map(b => `<span class="badge">${b}</span>`).join('')}
                </div>
            </div>
        `).join('');
        
        document.getElementById('policy-count').textContent = `（${filtered.length}条）`;
    }
    
    // 显示弹窗
    function showModal(id) {
        const policy = policies.find(p => p.id === id);
        if (!policy) return;
        
        const coreHtml = policy.core.map((c, i) => `
            <div class="core-point">
                <div class="core-point-title">核心要点${i+1}：${c.title}</div>
                <div class="core-point-content">${c.content}</div>
            </div>
        `).join('');
        
        const impactRows = Object.entries(policy.impact).map(([seg, text]) => 
            `<tr><td>${seg}</td><td>${text}</td></tr>`
        ).join('');
        
        const riskHtml = `
            <div class="risk-item policy"><strong>政策推进风险：</strong>${policy.risk.policy}</div>
            <div class="risk-item"><strong>产业链风险：</strong>${policy.risk.industry}</div>
        `;
        
        document.getElementById('modal-title').textContent = policy.title;
        document.getElementById('modal-body').innerHTML = `
            <div class="modal-section">
                <h3>基本信息</h3>
                <p><span class="modal-label">发布时间：</span>${policy.date}</p>
                <p><span class="modal-label">发布主体：</span>${policy.issuer}</p>
                <p><span class="modal-label">涉及BU：</span>${policy.bu.join('、')}</p>
            </div>
            <div class="modal-section">
                <h3>核心要点</h3>
                ${coreHtml}
            </div>
            <div class="modal-section">
                <h3>政策定位</h3>
                <p><span class="position-tag">纵向</span>${policy.vertical}</p>
                <p><span class="position-tag">横向</span>${policy.horizontal}</p>
            </div>
            <div class="modal-section">
                <h3>政策影响（分环节）</h3>
                <table class="impact-table">
                    <thead><tr><th>产业环节</th><th>具体影响</th></tr></thead>
                    <tbody>${impactRows}</tbody>
                </table>
            </div>
            <div class="modal-section">
                <h3>风险控制</h3>
                ${riskHtml}
            </div>
        `;
        
        document.getElementById('modal-overlay').classList.add('active');
        document.getElementById('modal').classList.add('active');
    }
    
    // 关闭弹窗
    function closeModal() {
        document.getElementById('modal-overlay').classList.remove('active');
        document.getElementById('modal').classList.remove('active');
    }
    
    // 筛选按钮
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderTimeline(btn.dataset.filter);
        });
    });
    
    // 弹窗关闭
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal-overlay').addEventListener('click', closeModal);
    
    // 初始化
    renderTimeline();
    </script>
</body>
</html>
