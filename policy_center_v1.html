<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>政策中心 - 时间轴</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f5f7fa; padding: 20px; }
        
        .header { background: linear-gradient(135deg, #1F3864 0%, #2E75B6 100%); color: white; padding: 24px; border-radius: 12px; margin-bottom: 24px; }
        .header h1 { font-size: 24px; margin-bottom: 8px; }
        .header p { opacity: 0.9; font-size: 14px; }
        
        .bu-filter { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .bu-btn { padding: 8px 16px; border: 2px solid #ddd; background: white; border-radius: 20px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
        .bu-btn.active { background: #1F3864; color: white; border-color: #1F3864; }
        
        .timeline { position: relative; padding-left: 30px; }
        .timeline::before { content: ''; position: absolute; left: 10px; top: 0; bottom: 0; width: 2px; background: linear-gradient(to bottom, #1F3864, #2E75B6); }
        
        .timeline-item { position: relative; margin-bottom: 30px; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); cursor: pointer; transition: all 0.3s; }
        .timeline-item:hover { transform: translateX(4px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
        .timeline-item::before { content: ''; position: absolute; left: -24px; top: 24px; width: 12px; height: 12px; background: #1F3864; border: 3px solid white; border-radius: 50%; box-shadow: 0 0 0 2px #1F3864; }
        
        .item-date { font-size: 12px; color: #1F3864; font-weight: 600; margin-bottom: 6px; }
        .item-title { font-size: 16px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px; }
        .item-issuer { font-size: 13px; color: #666; margin-bottom: 10px; }
        .item-badges { display: flex; gap: 6px; flex-wrap: wrap; }
        .badge { padding: 4px 10px; background: #e8f0fe; color: #1F3864; font-size: 12px; border-radius: 4px; }
        
        /* 弹窗 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal-overlay.active { display: block; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 700px; max-height: 85vh; background: white; border-radius: 16px; z-index: 1001; overflow: hidden; }
        .modal.active { display: block; overflow-y: auto; }
        .modal-header { background: linear-gradient(135deg, #1F3864 0%, #2E75B6 100%); color: white; padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; }
        .modal-header h2 { font-size: 18px; flex: 1; }
        .modal-close { background: none; border: none; color: white; font-size: 24px; cursor: pointer; padding: 4px 8px; }
        
        .modal-body { padding: 24px; }
        .modal-section { margin-bottom: 20px; }
        .modal-section h3 { font-size: 14px; color: #1F3864; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 2px solid #e8f0fe; }
        .modal-label { font-weight: 600; margin-right: 8px; color: #333; }
        
        .core-point { background: #f8f9fa; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid #1F3864; }
        .core-point-title { font-weight: 600; color: #1F3864; margin-bottom: 6px; }
        .core-point-content { color: #555; font-size: 14px; line-height: 1.6; }
        
        .impact-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .impact-table th, .impact-table td { padding: 10px; border: 1px solid #e0e0e0; text-align: left; }
        .impact-table th { background: #f5f7fa; font-weight: 600; color: #1F3864; }
        
        .risk-item { padding: 8px 12px; background: #fff5f5; border-left: 3px solid #dc3545; margin-bottom: 8px; border-radius: 4px; }
        .risk-item.policy { background: #fff8e6; border-left-color: #ffc107; }
        
        .position-tag { display: inline-block; padding: 4px 10px; background: #e8f5e9; color: #2e7d32; font-size: 12px; border-radius: 4px; margin-right: 6px; }
    </style>
</head>

    // 渲染时间轴
    function renderTimeline(list) {
        const tl = document.getElementById('timeline');
        if (list.length === 0) {
            tl.innerHTML = '<p style="color:#999;text-align:center;padding:40px;">暂无政策</p>';
            return;
        }
        tl.innerHTML = list.map(p => `
            <div class="timeline-item" onclick="openModal('${p.id}')">
                <div class="item-date">${p.date} · ${p.effective_date ? ' 至 ' + p.effective_date : ''}</div>
                <div class="item-title">${p.title}</div>
                <div class="item-issuer">${p.issuer}（${p.issuer_short}）</div>
                <div class="item-badges">
                    ${p.bu.map(b => `<span class="badge">${b}</span>`).join('')}
                </div>
            </div>
        `).join('');
    }
    
    // 打开详情弹窗
    function openModal(id) {
        const p = policies.find(x => x.id === id);
        if (!p) return;
        
        document.getElementById('modal-title').textContent = p.title;
        document.getElementById('modal-body').innerHTML = `
            <div class="modal-section">
                <h3>基本信息</h3>
                <p><span class="modal-label">发布时间：</span>${p.date}</p>
                <p><span class="modal-label">实施时间：</span>${p.effective_date}</p>
                <p><span class="modal-label">发布主体：</span>${p.issuer}（${p.issuer_short}）</p>
                <p><span class="modal-label">文号：</span>${p.document_number}</p>
                <p><span class="modal-label">政策层级：</span>${p.level}</p>
                <p><span class="modal-label">政策类型：</span>${p.type}</p>
            </div>
            
            <div class="modal-section">
                <h3>核心要点</h3>
                ${p.corePoints.map((cp, i) => `
                    <div class="core-point">
                        <div class="core-point-title">要点${i+1}：${cp.point}</div>
                        <div class="core-point-content">${cp.explain}</div>
                    </div>
                `).join('')}
            </div>
            
            <div class="modal-section">
                <h3>政策定位</h3>
                <p><span class="position-tag">横向：${p.policyPositioning.horizontal}</span></p>
                <p><span class="position-tag">纵向：${p.policyPositioning.vertical}</span></p>
            </div>
            
            <div class="modal-section">
                <h3>政策影响（分环节）</h3>
                <table class="impact-table">
                    <tr><th>产业环节</th><th>影响</th></tr>
                    <tr><td>上游材料</td><td>${p.impactBySegment.upstream_materials}</td></tr>
                    <tr><td>中游制造</td><td>${p.impactBySegment.midstream_manufacturing}</td></tr>
                    <tr><td>下游应用</td><td>${p.impactBySegment.downstream_application}</td></tr>
                    <tr><td>回收环节</td><td>${p.impactBySegment.recycling}</td></tr>
                </table>
            </div>
            
            <div class="modal-section">
                <h3>风险控制</h3>
                <p style="font-weight:600;margin-bottom:8px;">政策推进风险</p>
                ${p.riskControl.policy_risks.map(r => `<div class="risk-item policy">${r}</div>`).join('')}
                <p style="font-weight:600;margin-bottom:8px;margin-top:12px;">产业链风险</p>
                ${p.riskControl.industry_risks.map(r => `<div class="risk-item">${r}</div>`).join('')}
            </div>
            
            <div class="modal-section">
                <h3>原文链接</h3>
                <p><a href="${p.url}" target="_blank" style="color:#1F3864;">${p.url}</a></p>
            </div>
        `;
        
        document.getElementById('modal-overlay').classList.add('active');
        document.getElementById('modal').classList.add('active');
    }
    
    // 关闭弹窗

    });
    document.getElementById('modal-close').addEventListener('click', () => {
        document.getElementById('modal-overlay').classList.remove('active');
        document.getElementById('modal').classList.remove('active');
    });

    document.querySelectorAll('.bu-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.bu-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentBu = btn.dataset.bu;
            if (currentBu === 'all') {
                renderTimeline(policies);
                document.getElementById('policy-count').textContent = policies.length;
            } else {
                const filtered = policies.filter(p => p.bu.includes(currentBu));
                renderTimeline(filtered);
                document.getElementById('policy-count').textContent = filtered.length;
            }
        });
    });
    
    // 初始化
    renderTimeline(policies);
    document.getElementById('policy-count').textContent = policies.length;
    </script>
</body>
</html>
